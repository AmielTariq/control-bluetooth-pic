<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control PIC18F4550 - ROBOT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 20px; }
        .btn { padding: 20px; width: 85%; margin: 10px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; transition: 0.3s; }
        .on { background-color: #2ecc71; color: white; }
        .on:active { background-color: #27ae60; transform: scale(0.98); }
        .off { background-color: #e74c3c; color: white; }
        .off:active { background-color: #c0392b; transform: scale(0.98); }
        .connect { background-color: #3498db; color: white; margin-bottom: 20px; box-shadow: 0 4px #2980b9; }
        .connect:active { box-shadow: 0 2px #2980b9; transform: translateY(2px); }
        hr { border: 0; height: 1px; background: #444; margin: 20px 0; }
        #status { color: #f1c40f; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Panel de Control</h1>
    <p id="status">Estado: Desconectado</p>
    <button class="btn connect" onclick="conectarBT()">🔗 CONECTAR AL ROBOT</button>
    
    <hr>
    
    <h3>CONTROL LED 1</h3>
    <button class="btn on" onclick="enviarDato('a')">ENCENDER (A)</button>
    <button class="btn off" onclick="enviarDato('b')">APAGAR (B)</button>

    <hr>

    <h3>CONTROL LED 2</h3>
    <button class="btn on" onclick="enviarDato('c')">ENCENDER (C)</button>
    <button class="btn off" onclick="enviarDato('d')">APAGAR (D)</button>

    <script>
        let caracteristicaGATT = null;

        // UUID estándar para el servicio Serial Port Profile (SPP)
        const SERIAL_SERVICE_UUID = '00001101-0000-1000-8000-00805f9b34fb';

        async function conectarBT() {
            const statusLabel = document.getElementById('status');
            try {
                statusLabel.innerText = "Buscando dispositivo...";
                
                const dispositivo = await navigator.bluetooth.requestDevice({
                    // Filtramos por el nombre que aparece en tu celular
                    filters: [{ namePrefix: 'ROBOT' }, { namePrefix: 'HC' }], 
                    optionalServices: [SERIAL_SERVICE_UUID]
                });

                statusLabel.innerText = "Conectando...";
                const servidor = await dispositivo.gatt.connect();
                const servicio = await servidor.getPrimaryService(SERIAL_SERVICE_UUID);
                
                // Buscamos la característica de escritura
                const caracteristicas = await servicio.getCharacteristics();
                caracteristicaGATT = caracteristicas[0]; 
                
                statusLabel.innerText = "Estado: ¡CONECTADO!";
                statusLabel.style.color = "#2ecc71";
                alert("Conectado con éxito a " + dispositivo.name);
            } catch (error) {
                console.error(error);
                statusLabel.innerText = "Error de conexión";
                statusLabel.style.color = "#e74c3c";
                alert("Error: Asegúrate de estar en HTTPS y con Bluetooth activo.");
            }
        }

        async function enviarDato(caracter) {
            if (caracteristicaGATT) {
                try {
                    const encoder = new TextEncoder();
                    await caracteristicaGATT.writeValue(encoder.encode(caracter));
                    console.log("Enviado: " + caracter);
                } catch (error) {
                    alert("Se perdió la conexión");
                    document.getElementById('status').innerText = "Estado: Desconectado";
                }
            } else {
                alert("Primero debes conectar el Bluetooth");
            }
        }
    </script>
</body>
</html>
