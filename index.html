<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control PIC18F4550 - ROBOT</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #1a1a1a; 
            color: white; 
            padding-top: 20px; 
        }
        .btn { 
            padding: 20px; 
            width: 85%; 
            margin: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 12px; 
            border: none; 
            transition: 0.3s; 
        }
        .on { background-color: #2ecc71; color: white; }
        .on:active { background-color: #27ae60; transform: scale(0.95); }
        
        .off { background-color: #e74c3c; color: white; }
        .off:active { background-color: #c0392b; transform: scale(0.95); }
        
        .connect { 
            background-color: #3498db; 
            color: white; 
            margin-bottom: 20px; 
            box-shadow: 0 4px #2980b9; 
        }
        .connect:active { 
            box-shadow: 0 2px #2980b9; 
            transform: translateY(2px); 
        }
        
        hr { border: 0; height: 1px; background: #444; margin: 20px 0; }
        #status { color: #f1c40f; margin-bottom: 10px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Panel de Control Robot</h1>
    <p id="status">Estado: DESCONECTADO</p>
    <button class="btn connect" onclick="conectarBT()">🔗 CONECTAR AL ROBOT</button>
    
    <hr>
    
    <h3>CONTROL LED 1</h3>
    <button class="btn on" onclick="enviarDato('a')">ENCENDER (A)</button>
    <button class="btn off" onclick="enviarDato('b')">APAGAR (B)</button>

    <hr>

    <h3>CONTROL LED 2</h3>
    <button class="btn on" onclick="enviarDato('c')">ENCENDER (C)</button>
    <button class="btn off" onclick="enviarDato('d')">APAGAR (D)</button>

    <script>
        let caracteristicaGATT = null;
        let dispositivoBT = null;

        // UUIDs estándar para módulos BLE tipo HM-10 (Servicio Serial)
        const SERVICE_UUID = 0xFFE0; 
        const CHARACTERISTIC_UUID = 0xFFE1; 

        async function conectarBT() {
            const statusLabel = document.getElementById('status');
            try {
                statusLabel.innerText = "Buscando dispositivo...";
                
                // Pedir dispositivo con filtros de nombre comunes
                dispositivoBT = await navigator.bluetooth.requestDevice({
                    filters: [
                        { namePrefix: 'HC' }, 
                        { namePrefix: 'HM' },
                        { namePrefix: 'ROBOT' }
                    ],
                    optionalServices: [SERVICE_UUID]
                });

                statusLabel.innerText = "Conectando al servidor GATT...";
                const servidor = await dispositivoBT.gatt.connect();
                
                statusLabel.innerText = "Obteniendo servicio...";
                const servicio = await servidor.getPrimaryService(SERVICE_UUID);
                
                statusLabel.innerText = "Obteniendo característica...";
                caracteristicaGATT = await servicio.getCharacteristic(CHARACTERISTIC_UUID);
                
                statusLabel.innerText = "Estado: ¡CONECTADO!";
                statusLabel.style.color = "#2ecc71";
                console.log("Conectado a: " + dispositivoBT.name);

            } catch (error) {
                console.error("Error:", error);
                statusLabel.innerText = "Error de conexión";
                statusLabel.style.color = "#e74c3c";
                alert("Error: Asegúrate de usar HTTPS y que el dispositivo sea BLE.");
            }
        }

        async function enviarDato(caracter) {
            if (!caracteristicaGATT) {
                alert("Primero debes conectar el Bluetooth");
                return;
            }

            try {
                const encoder = new TextEncoder();
                await caracteristicaGATT.writeValue(encoder.encode(caracter));
                console.log("Enviado al PIC: " + caracter);
            } catch (error) {
                console.error("Error al enviar:", error);
                document.getElementById('status').innerText = "Estado: Desconectado";
                document.getElementById('status').style.color = "#f1c40f";
                caracteristicaGATT = null;
                alert("Se perdió la conexión con el robot");
            }
        }
    </script>
</body>
</html>
